<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E&O — Door Decal 10x14</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    @page {
      size: 10in 14in;
      margin: 0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 10in;
      height: 14in;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .decal {
      width: 8in;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .name {
      font-size: 62pt;
      font-weight: 600;
      color: #2C4A3E;
      line-height: 1;
      white-space: nowrap;
      letter-spacing: -0.5pt;
    }

    .rule {
      display: flex;
      align-items: center;
      gap: 10pt;
      width: 100%;
      margin: 22pt 0 18pt;
    }
    .rule-line { flex: 1; height: 1pt; background: #BEA55A; }
    .rule-dot  { width: 6pt; height: 6pt; border-radius: 50%; background: #BEA55A; flex-shrink: 0; }

    .tagline {
      font-size: 28pt;
      font-weight: 400;
      color: #2C4A3E;
      letter-spacing: 0.5pt;
      margin-bottom: 40pt;
    }

    .divider {
      width: 60pt;
      height: 1pt;
      background: #e0ddd8;
      margin-bottom: 36pt;
    }

    .detail {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11pt;
      letter-spacing: 2.5pt;
      text-transform: uppercase;
      color: #7a8a85;
      line-height: 2.4;
    }
  </style>
</head>
<body>
  <div class="decal">
    <div class="name">Emerald &amp; Opal</div>
    <div class="rule">
      <div class="rule-line"></div>
      <div class="rule-dot"></div>
      <div class="rule-line"></div>
    </div>
    <div class="tagline">Ear Piercing &amp; Jewelry</div>
    <div class="divider"></div>
    <div class="detail">
      Book Online<br>
      Walk-ins Welcome<br>
      <br>
      emeraldandopalpiercing.com<br>
      503.217.4065
    </div>
  </div>
</body>
</html>
